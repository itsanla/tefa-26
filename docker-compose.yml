name: tefa-26

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    image: itsanla/api-tefa-26:local
    container_name: tefa-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8787}:8787"
    environment:
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8787/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8787/api}
        NEXT_PUBLIC_JWT_SECRET: ${NEXT_PUBLIC_JWT_SECRET:-changeme}
    image: itsanla/tefa-26:local
    container_name: tefa-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
